databases:
  - name: velora-motors-db
    plan: free

services:
  - type: web
    name: velora-motors
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn velora_motors.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_DB_SSL_REQUIRE
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: velora-motors-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"
