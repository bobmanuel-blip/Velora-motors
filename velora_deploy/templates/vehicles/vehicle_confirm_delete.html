{% extends "base.html" %}
{% block title %}Remove Listing — Velora Motors{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
  <div class="glass rounded-2xl p-8 text-center">
    <div class="text-4xl mb-4">🗑️</div>
    <h1 class="text-xl font-bold mb-2">Remove this listing?</h1>
    <p class="text-white/60 mb-6">
      <strong>{{ vehicle }}</strong> will be permanently removed from Velora Motors.
      This cannot be undone.
    </p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <a href="{% url 'vehicles:vehicle_detail' vehicle.pk %}" class="px-6 py-3 rounded-xl glass">Cancel</a>
      <button class="px-6 py-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold">Yes, Remove It</button>
    </form>
  </div>
</div>
{% endblock %}
